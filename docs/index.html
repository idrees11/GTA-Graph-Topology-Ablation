<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA Challenge - Leaderboard</title>
    <link rel="stylesheet" href="leaderboard.css">
</head>
<body>
    <canvas id="graph-canvas"></canvas>
    
    <div class="container">
        <div class="header">
            <h1>🏆 GTA Challenge Leaderboard</h1>
            <p>Graph Topology Ablation – GNN Competition</p>
        </div>
        <p class="last-updated" id="last-updated">Loading...</p>
        
        <div class="leaderboard">
            <table>
                <thead id="table-header">
                    <tr>
                        <th class="rank">Rank</th>
                        <th>Team</th>
                        <th>F1 (Ideal)</th>
                        <th>F1 (Perturbed)</th>
                        <th>Robustness Gap</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td colspan="100%" class="empty">Loading leaderboard data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="footer">
            <p>Submit your solution via Pull Request to appear on the leaderboard!</p>
            <p style="margin-top: 10px; font-size: 0.95em;">
                <a href="https://github.com/idrees11/GTA-Graph-Topology-Ablation_-GTA-"  
                   target="_blank" 
                   rel="noopener noreferrer">
                    🔗 View Repository on GitHub
                </a>
            </p>
        </div>
    </div>
    
    <script src="leaderboard.js"></script>
</body>
</html>
